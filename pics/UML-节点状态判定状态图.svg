<svg xmlns="http://www.w3.org/2000/svg" width="1880" height="980" viewBox="0 0 1880 980">
<defs>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
<path d="M0,0 L12,6 L0,12 z" fill="#334155"/>
</marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
<feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.08"/>
</filter>
</defs>
<rect width="1880" height="980" fill="#ffffff"/>
<text x="940.0" y="42" text-anchor="middle" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="30" font-weight="700" fill="#0f172a">节点状态判定状态图</text>
<rect x="70" y="120" width="1740" height="620" rx="30" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
