server {
    listen 80 default_server;
    listen [::]:80 default_server;

    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow ::1;
        deny all;
    }

    location / {
        default_type text/plain;
        return 200 'middleware-node nginx is running';
    }
}
