server:
  port: 8082

spring:
  application:
    name: middleware-service
  datasource:
    url: jdbc:mysql://mysql:3306/monitoring?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: monitoring
    password: monitoring
  data:
    redis:
      host: 127.0.0.1
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: middleware-service
