global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "backend"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["backend:8080"]

  - job_name: "app-node"
    static_configs:
      - targets: ["app-node:9100"]

  - job_name: "sample-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["app-node:8081"]

  - job_name: "middleware-node"
    static_configs:
      - targets: ["middleware-node:9100"]
